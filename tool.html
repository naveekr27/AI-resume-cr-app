<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px;
}

/* LEFT */
.left-side {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* PANELS */
.panel {
  background: #fff;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #1a73e8;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #1558b0;
}

/* JOB BOX */
#job {
  height: 150px;
}

/* RIGHT */
.right-side {
  height: 100%;
}

/* RESUME PREVIEW */
.resume {
  height: 100%;
  min-height: 500px;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.resume h1 {
  margin: 0;
  color: #1a73e8;
}

.resume-section {
  margin-top: 15px;
}

.resume-section h3 {
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 5px;
}

/* SUGGESTIONS */
#suggestions {
  font-size: 0.95em;
  line-height: 1.5;
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .container {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- LEFT -->
  <div class="left-side">

    <!-- BUILD -->
    <div class="panel">
      <h2>Build Your Resume</h2>

      <input id="name" placeholder="Your Name">

      <textarea id="experience" placeholder="Your Experience..."></textarea>

      <textarea id="skills" placeholder="Your Skills..."></textarea>

      <input type="file" id="resumeUpload" accept=".pdf,.docx">

      <h3>Job Description</h3>
      <textarea id="job" placeholder="Paste job description..."></textarea>

      <button onclick="generateResume()">Generate Resume</button>
    </div>

    <!-- SUGGESTIONS -->
    <div class="panel">
      <h2>AI Suggestions</h2>
      <div id="suggestions">Upload resume + job description to get AI feedback.</div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="panel right-side">
    <h2>Live Resume Preview</h2>

    <div class="resume" id="resumePreview">
      <h1>Your Name</h1>

      <div class="resume-section">
        <h3>Experience</h3>
        <p>Your experience will appear here...</p>
      </div>

      <div class="resume-section">
        <h3>Skills</h3>
        <p>Your skills will appear here...</p>
      </div>
    </div>
  </div>

</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.14/mammoth.browser.min.js"></script>

<script>
// Extract PDF
async function extractPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(' ') + ' ';
  }
  return text;
}

// Extract DOCX
async function extractDOCX(file) {
  const arrayBuffer = await file.arrayBuffer();
  const result = await mammoth.extractRawText({arrayBuffer});
  return result.value;
}

// 🔥 AI CALL (to your backend)
async function getAISuggestions(resumeText, jobText) {
  const response = await fetch("http://localhost:3000/ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      resume: resumeText,
      job: jobText
    })
  });

  const data = await response.json();
  return data.choices[0].message.content;
}

// MAIN FUNCTION
async function generateResume() {
  const name = document.getElementById('name').value;
  const exp = document.getElementById('experience').value;
  const skills = document.getElementById('skills').value;
  const job = document.getElementById('job').value;
  const file = document.getElementById('resumeUpload').files[0];

  let resumeText = exp + " " + skills;

  // File support
  if (file) {
    if (file.name.endsWith('.pdf')) resumeText = await extractPDF(file);
    else if (file.name.endsWith('.docx')) resumeText = await extractDOCX(file);
  }

  // Update preview
  document.getElementById('resumePreview').innerHTML = `
    <h1>${name || "Your Name"}</h1>

    <div class="resume-section">
      <h3>Experience</h3>
      <p>${exp || "Add your experience..."}</p>
    </div>

    <div class="resume-section">
      <h3>Skills</h3>
      <p>${skills || "Add your skills..."}</p>
    </div>
  `;

  // Show loading
  const suggestionsDiv = document.getElementById('suggestions');
  suggestionsDiv.innerHTML = "🤖 Analyzing with AI...";

  try {
    const aiSuggestions = await getAISuggestions(resumeText, job);

    suggestionsDiv.innerHTML = `
      <div style="white-space: pre-line;">${aiSuggestions}</div>
    `;
  } catch (error) {
    suggestionsDiv.innerHTML = "Error connecting to AI backend.";
  }
}
</script>

</body>
</html>
