<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Improvement Tool</title>
<link rel="stylesheet" href="styles.css">
<style>
.container { display: flex; flex-wrap: wrap; max-width: 1200px; margin: 50px auto; gap: 20px; }
.section { flex: 1 1 45%; min-height: 400px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
textarea { width: 100%; height: 300px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; resize: vertical; }
ul { padding-left: 20px; }
</style>
</head>
<body>
<div class="container">
    <div class="section">
        <h2>Job Description</h2>
        <textarea id="jobDescription" placeholder="Paste job description here..."></textarea>
        <button onclick="analyzeJob()">Analyze</button>
    </div>
    <div class="section">
        <h2>Resume Suggestions</h2>
        <div id="suggestions">Paste a job description and click Analyze to see improvements.</div>
    </div>
</div>
<script>
const keySkills = ['JavaScript','React','CSS','HTML','Python','Marketing','Design','SEO','Project Management','UI/UX','Team Leadership'];

function analyzeJob() {
    const jobText = document.getElementById('jobDescription').value;
    const suggestionsDiv = document.getElementById('suggestions');
    if (!jobText.trim()) { 
        suggestionsDiv.innerHTML = 'Please paste a job description first.'; 
        return; 
    }
    const foundSkills = keySkills.filter(skill => jobText.toLowerCase().includes(skill.toLowerCase()));
    let suggestionsHTML = '<ul>';
    if (foundSkills.length === 0) {
        suggestionsHTML += '<li>No specific skills detected. Make sure your resume highlights relevant skills.</li>';
    } else {
        foundSkills.forEach(skill => {
            suggestionsHTML += `<li>Highlight your experience with <strong>${skill}</strong> in your resume.</li>`;
        });
    }
    suggestionsHTML += '</ul>';
    suggestionsDiv.innerHTML = suggestionsHTML;
}
</script>
</body>
</html>
