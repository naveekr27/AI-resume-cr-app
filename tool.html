<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Improvement Tool</title>
<link rel="stylesheet" href="styles.css">
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  min-height: 100vh;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  max-width: 1200px;
  width: 90%;
  animation: fadeIn 1.5s ease-in;
}
.section {
  flex: 1 1 45%;
  min-height: 450px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  animation: slideUp 1s ease-out;
}
.section h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 1.8em;
  text-align: center;
}
textarea {
  width: 100%;
  height: 150px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  resize: vertical;
  font-size: 1em;
  outline: none;
}
input[type=file] {
  display: block;
  margin-bottom: 15px;
  font-size: 1em;
}
button {
  margin-top: 10px;
  padding: 12px 25px;
  font-size: 1em;
  color: #fff;
  background-color: #ff6a00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
}
button:hover {
  background-color: #ff3d00;
  transform: scale(1.05);
}
#suggestions {
  font-size: 1em;
  line-height: 1.5;
}
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
@keyframes slideUp { from {transform: translateY(50px); opacity:0;} to {transform: translateY(0); opacity:1;} }
@media (max-width: 900px) { .section { flex: 1 1 100%; } }
</style>
</head>
<body>

<div class="container">
  <div class="section">
    <h2>Job & Resume</h2>
    <textarea id="jobDescription" placeholder="Paste job description here..."></textarea>
    <input type="file" id="resumeUpload" accept=".pdf,.docx">
    <button onclick="analyzeResume()">Analyze Resume</button>
  </div>
  <div class="section">
    <h2>Suggestions</h2>
    <div id="suggestions">Paste a job description and upload your resume to get suggestions.</div>
  </div>
</div>

<!-- Libraries for PDF & DOCX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.9.179/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.14/mammoth.browser.min.js"></script>

<script>
const keySkills = ['JavaScript','React','CSS','HTML','Python','Marketing','Design','SEO','Project Management','UI/UX','Team Leadership'];
const actionTips = [
  'Use strong action verbs in your bullet points.',
  'Include measurable results (e.g., increased sales by 20%).',
  'Highlight missing skills mentioned in the job description.',
  'Include relevant certifications or education.',
  'Keep bullet points concise and achievement-focused.'
];

// Extract text from PDF
async function extractPDF(file) {
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
  let text = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const strings = content.items.map(item => item.str);
    text += strings.join(' ') + ' ';
  }
  return text;
}

// Extract text from DOCX
async function extractDOCX(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async function(event) {
      const arrayBuffer = event.target.result;
      const result = await mammoth.extractRawText({arrayBuffer: arrayBuffer});
      resolve(result.value);
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Main analysis function
async function analyzeResume() {
  const jobText = document.getElementById('jobDescription').value.toLowerCase();
  const resumeFile = document.getElementById('resumeUpload').files[0];
  const suggestionsDiv = document.getElementById('suggestions');
  let resumeText = '';

  if (!jobText.trim() && !resumeFile) {
    suggestionsDiv.innerHTML = 'Please provide a job description or upload a resume.';
    return;
  }

  if (resumeFile) {
    if (resumeFile.name.endsWith('.pdf')) resumeText = await extractPDF(resumeFile);
    else if (resumeFile.name.endsWith('.docx')) resumeText = await extractDOCX(resumeFile);
    resumeText = resumeText.toLowerCase();
  }

  const foundSkills = keySkills.filter(skill => jobText.includes(skill.toLowerCase()));
  const missingSkills = foundSkills.filter(skill => !resumeText.includes(skill.toLowerCase()));

  let suggestionsHTML = '<ul>';

  if (foundSkills.length === 0) {
    suggestionsHTML += '<li>No key skills detected in job description.</li>';
  } else {
    foundSkills.forEach(skill => {
      if (!resumeText.includes(skill.toLowerCase())) {
        suggestionsHTML += `<li>Add <strong>${skill}</strong> to your resume if relevant.</li>`;
      } else {
        suggestionsHTML += `<li>Your resume already mentions <strong>${skill}</strong>.</li>`;
      }
    });
  }

  actionTips.forEach(tip => suggestionsHTML += `<li>${tip}</li>`);
  suggestionsHTML += '</ul>';
  suggestionsDiv.innerHTML = suggestionsHTML;
}
</script>
</body>
</html>
