<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Improvement Tool</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Full-page gradient background */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #6a11cb, #2575fc);
  min-height: 100vh;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container for two sections */
.container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  max-width: 1200px;
  width: 90%;
  animation: fadeIn 1.5s ease-in;
}

/* Each panel */
.section {
  flex: 1 1 45%;
  min-height: 400px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.3);
  animation: slideUp 1s ease-out;
}

/* Headings */
.section h2 {
  margin-top: 0;
  margin-bottom: 15px;
  font-size: 1.8em;
  text-align: center;
}

/* Textarea styling */
textarea {
  width: 100%;
  height: 250px;
  padding: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;
  resize: vertical;
  font-size: 1em;
  outline: none;
}

/* Button styling */
button {
  margin-top: 20px;
  padding: 12px 25px;
  font-size: 1em;
  color: #fff;
  background-color: #ff6a00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  transition: all 0.3s ease;
}
button:hover {
  background-color: #ff3d00;
  transform: scale(1.05);
}

/* Suggestions panel */
#suggestions {
  font-size: 1em;
  line-height: 1.5;
}

/* Animations */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}
@keyframes slideUp {
  from {transform: translateY(50px); opacity: 0;}
  to {transform: translateY(0); opacity: 1;}
}

/* Responsive layout for small screens */
@media (max-width: 900px) {
  .section { flex: 1 1 100%; }
}
</style>
</head>
<body>
<div class="container">
    <div class="section">
        <h2>Job Description</h2>
        <textarea id="jobDescription" placeholder="Paste job description here..."></textarea>
        <button onclick="analyzeJob()">Analyze</button>
    </div>
    <div class="section">
        <h2>Resume Suggestions</h2>
        <div id="suggestions">Paste a job description and click Analyze to see improvements.</div>
    </div>
</div>

<script>
const keySkills = ['JavaScript','React','CSS','HTML','Python','Marketing','Design','SEO','Project Management','UI/UX','Team Leadership'];

function analyzeJob() {
    const jobText = document.getElementById('jobDescription').value;
    const suggestionsDiv = document.getElementById('suggestions');
    if (!jobText.trim()) { 
        suggestionsDiv.innerHTML = 'Please paste a job description first.'; 
        return; 
    }
    const foundSkills = keySkills.filter(skill => jobText.toLowerCase().includes(skill.toLowerCase()));
    let suggestionsHTML = '<ul>';
    if (foundSkills.length === 0) {
        suggestionsHTML += '<li>No specific skills detected. Make sure your resume highlights relevant skills.</li>';
    } else {
        foundSkills.forEach(skill => {
            suggestionsHTML += `<li>Highlight your experience with <strong>${skill}</strong> in your resume.</li>`;
        });
    }
    suggestionsHTML += '</ul>';
    suggestionsDiv.innerHTML = suggestionsHTML;
}
</script>
</body>
</html>
