<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #f4f6f9;
}

/* Layout */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr 300px;
  gap: 20px;
  padding: 20px;
}

/* Panels */
.panel {
  background: #fff;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Headings */
h2 {
  margin-top: 0;
  font-size: 1.3em;
}

/* Inputs */
input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

/* Button */
button {
  padding: 12px;
  width: 100%;
  border: none;
  border-radius: 10px;
  background: #1a73e8;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #1558b0;
}

/* Resume Preview */
.resume {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.resume h1 {
  margin: 0;
  color: #1a73e8;
}

.resume-section {
  margin-top: 15px;
}

.resume-section h3 {
  border-bottom: 2px solid #1a73e8;
  padding-bottom: 5px;
}

/* Suggestions */
#suggestions {
  font-size: 0.9em;
}

</style>
</head>
<body>

<div class="container">

  <!-- LEFT: INPUT -->
  <div class="panel">
    <h2>Build Your Resume</h2>

    <input id="name" placeholder="Your Name">

    <textarea id="experience" placeholder="Your Experience..."></textarea>

    <textarea id="skills" placeholder="Your Skills..."></textarea>

    <h3>Job Description</h3>
    <textarea id="job" placeholder="Paste job description..."></textarea>

    <button onclick="generateResume()">Generate Resume</button>
  </div>

  <!-- CENTER: TEMPLATE PREVIEW -->
  <div class="panel">
    <h2>Live Resume Preview</h2>

    <div class="resume" id="resumePreview">
      <h1>Your Name</h1>

      <div class="resume-section">
        <h3>Experience</h3>
        <p>Your experience will appear here...</p>
      </div>

      <div class="resume-section">
        <h3>Skills</h3>
        <p>Your skills will appear here...</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: SUGGESTIONS -->
  <div class="panel">
    <h2>Suggestions</h2>
    <div id="suggestions">Suggestions will appear here...</div>
  </div>

</div>

<script>
const keySkills = ['javascript','react','python','management','design','seo'];

function generateResume() {
  const name = document.getElementById('name').value;
  const exp = document.getElementById('experience').value;
  const skills = document.getElementById('skills').value;
  const job = document.getElementById('job').value.toLowerCase();

  // Update preview
  document.getElementById('resumePreview').innerHTML = `
    <h1>${name || "Your Name"}</h1>

    <div class="resume-section">
      <h3>Experience</h3>
      <p>${exp || "Add your experience..."}</p>
    </div>

    <div class="resume-section">
      <h3>Skills</h3>
      <p>${skills || "Add your skills..."}</p>
    </div>
  `;

  // Suggestions
  let suggestions = "<ul>";

  keySkills.forEach(skill => {
    if (job.includes(skill) && !skills.toLowerCase().includes(skill)) {
      suggestions += `<li>Add <b>${skill}</b> to your skills</li>`;
    }
  });

  suggestions += `
    <li>Use action verbs (Led, Built, Improved)</li>
    <li>Add measurable results (e.g. increased sales by 20%)</li>
    <li>Keep bullet points concise</li>
  </ul>`;

  document.getElementById('suggestions').innerHTML = suggestions;
}
</script>

</body>
</html>
